name: Build Windows Executable (PySide2)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.8.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.8.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-py3.8-pyside2-5.15.2.1
          restore-keys: |
            ${{ runner.os }}-pip-py3.8-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide2==5.15.2.1 pyinstaller==5.13.2

      - name: Verify bundled tools exist
        shell: pwsh
        run: |
          if (-Not (Test-Path "bin\DirectXTex\texconv.exe")) {
            Write-Error "Missing: bin\DirectXTex\texconv.exe"
            exit 1
          }
          if (-Not (Test-Path "bin\ArchiveFix\ArchiveFix.exe")) {
            Write-Error "Missing: bin\ArchiveFix\ArchiveFix.exe"
            exit 1
          }
          Write-Host "All required binaries found." -ForegroundColor Green

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Resolve PySide2 location directly inside the build step — no inter-step output needed
          $pyside2Dir = python -c "import PySide2, os; print(os.path.dirname(PySide2.__file__))"
          Write-Host "PySide2 dir: $pyside2Dir"

          $platforms = Join-Path $pyside2Dir "plugins\platforms"
          $styles    = Join-Path $pyside2Dir "plugins\styles"

          Write-Host "platforms : $platforms  exists=$((Test-Path $platforms))"
          Write-Host "styles    : $styles  exists=$((Test-Path $styles))"

          $pyArgs = @(
            "--onefile",
            "--windowed",
            "--name", "MiamiHelper",
            "--add-data", "bin;bin",
            "--hidden-import", "PySide2.QtCore",
            "--hidden-import", "PySide2.QtGui",
            "--hidden-import", "PySide2.QtWidgets",
            "--hidden-import", "shiboken2",
            "--collect-all", "PySide2"
          )

          if (Test-Path $platforms) {
            $pyArgs += "--add-data"
            $pyArgs += "$platforms;PySide2\plugins\platforms"
          } else {
            Write-Warning "platforms plugin folder not found — skipping"
          }

          if (Test-Path $styles) {
            $pyArgs += "--add-data"
            $pyArgs += "$styles;PySide2\plugins\styles"
          } else {
            Write-Warning "styles plugin folder not found — skipping"
          }

          $pyArgs += "app.py"

          Write-Host "Command: pyinstaller $($pyArgs -join ' ')"
          pyinstaller @pyArgs

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist\MiamiHelper.exe")) {
            Write-Error "Build failed — MiamiHelper.exe not found in dist\"
            exit 1
          }
          $size = (Get-Item "dist\MiamiHelper.exe").length / 1MB
          Write-Host ("Build OK — Size: {0:N1} MB" -f $size) -ForegroundColor Green

      - name: Get short SHA
        id: sha
        shell: pwsh
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          echo "short_sha=$short" >> $env:GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiamiHelper-win64-${{ steps.sha.outputs.short_sha }}
          path: dist/MiamiHelper.exe
          retention-days: 30
          if-no-files-found: error
